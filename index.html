<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手绘小怪物乐园</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/menu.css" />
</head>
<body>
  <div class="menu-wrap">
    <header class="menu-header">
      <h1>手绘小怪物乐园</h1>
      <p>选一个游戏，点进去就能玩！</p>
    </header>

    <div class="game-grid">
      <a class="game-card" href="games/catch.html">
        <img src="assets/sprites/big_mouth.png" alt="" />
        <h2>大嘴接怪</h2>
        <p>滑动大嘴巴，接住天上掉下来的手绘小怪物</p>
        <span class="tag">可玩</span>
      </a>

      <a class="game-card" href="games/whack.html">
        <img src="assets/sprites/rabbit_head.png" alt="" />
        <h2>森林躲猫猫</h2>
        <p>从草丛和树洞里探头的小怪物，快点抓住它们！</p>
        <span class="tag">可玩</span>
      </a>

      <div class="game-card disabled">
        <img src="assets/sprites/happy_fish.png" alt="" />
        <h2>贴纸小屋</h2>
        <p>拖拽小怪物，在画布上摆出自己的场景</p>
        <span class="tag">敬请期待</span>
      </div>

      <div class="game-card disabled">
        <img src="assets/sprites/giant_eye.png" alt="" />
        <h2>眼睛跟随</h2>
        <p>所有眼睛都会盯着你的鼠标看</p>
        <span class="tag">敬请期待</span>
      </div>

      <a class="game-card" href="games/bounce.html">
        <img src="assets/sprites/spiky_puff.png" alt="" />
        <h2>刺刺球弹弹乐</h2>
        <p>点击发射刺刺球，像台球一样反弹撞飞小怪物！</p>
        <span class="tag">可玩</span>
      </a>
    </div>

    <footer>
      <p>双击 index.html 即可开始 · 无需服务器</p>
    </footer>
  </div>
</body>
</html>
